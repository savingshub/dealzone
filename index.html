<!DOCTYPE html>
<html lang="en">
<head>
<meta name='impact-site-verification' value='4114b44a-9d62-41db-a6db-454f99185848'>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealZone – Best Deals & Offers</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--accent:#FF5C1A;--dark:#111;--light:#FFF8F3;--card:#fff;--text:#222;--muted:#777}
  body{font-family:'DM Sans',sans-serif;background:var(--light);color:var(--text);min-height:100vh}
  nav{background:#111;padding:.7rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:#fff;letter-spacing:-1px}
  .logo span{color:var(--accent)}
  .nav-right{display:flex;align-items:center;gap:.5rem}
  nav a{color:#ccc;text-decoration:none;font-size:.85rem;margin-left:1rem;transition:color .2s}
  nav a:hover{color:#fff}
  .nav-search{display:flex;align-items:center;background:#ffffff15;border:1px solid #ffffff22;border-radius:50px;overflow:hidden;height:34px}
  .nav-search input{background:transparent;border:none;color:#fff;padding:.3rem 1rem;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;width:180px}
  .nav-search input::placeholder{color:#888}
  .nav-search button{background:var(--accent);border:none;color:#fff;padding:.3rem .9rem;cursor:pointer;font-size:.8rem;font-weight:600;height:100%;transition:background .2s}
  .nav-search button:hover{background:#e84e10}
  .categories{display:flex;gap:.5rem;padding:.8rem 2rem;overflow-x:auto;scrollbar-width:none;background:#111;border-top:1px solid #ffffff0f}
  .categories::-webkit-scrollbar{display:none}
  .cat-btn{background:#fff1;color:#ccc;border:1px solid #ffffff22;padding:.35rem 1rem;border-radius:50px;font-size:.8rem;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'DM Sans',sans-serif}
  .cat-btn:hover,.cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .section{padding:1.8rem 2rem;max-width:1100px;margin:0 auto}
  .section-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:1.2rem;display:flex;align-items:center;gap:.6rem}
  .badge{background:var(--accent);color:#fff;font-size:.65rem;padding:.2rem .55rem;border-radius:50px;font-family:'DM Sans',sans-serif;font-weight:500}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1rem}
  .card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,.07);transition:transform .2s,box-shadow .2s;border:1px solid #f0e8e0}
  .card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.12)}
  .card-img{width:100%;height:140px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;background:#f9f4f0}
  .card-body{padding:.9rem}
  .tag{font-size:.7rem;color:var(--accent);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.3rem}
  .card-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.35rem;line-height:1.3}
  .card-desc{font-size:.82rem;color:var(--muted);margin-bottom:.7rem;line-height:1.5}
  .price-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem}
  .price{font-size:1.15rem;font-weight:700;color:var(--text)}
  .old-price{font-size:.82rem;color:#bbb;text-decoration:line-through}
  .discount{background:#fff0eb;color:var(--accent);font-size:.72rem;padding:.15rem .45rem;border-radius:6px;font-weight:500}
  .cta-btn{display:block;width:100%;text-align:center;background:var(--dark);color:#fff;padding:.65rem;border-radius:10px;text-decoration:none;font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;transition:background .2s}
  .cta-btn:hover{background:var(--accent)}
  .whatsapp-bar{background:linear-gradient(135deg,#25D366,#128C7E);padding:1.5rem 2rem;text-align:center;color:#fff;margin:.5rem 0}
  .whatsapp-bar h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:.3rem}
  .whatsapp-bar p{opacity:.9;margin-bottom:.9rem;font-size:.9rem}
  .wa-btn{display:inline-block;background:#fff;color:#128C7E;padding:.55rem 1.8rem;border-radius:50px;font-family:'Syne',sans-serif;font-weight:700;text-decoration:none;font-size:.9rem;transition:transform .2s}
  .wa-btn:hover{transform:scale(1.05)}
  footer{background:#111;color:#666;text-align:center;padding:1.5rem;font-size:.82rem}
  footer span{color:var(--accent)}
  @media(max-width:600px){.grid{grid-template-columns:1fr 1fr}.nav-search{display:none}}
</style>
</head>
<body>

<nav>
  <div class="logo">Deal<span>Zone</span></div>
  <div class="nav-search">
    <input type="text" placeholder="Search deals...">
    <button>Go</button>
  </div>
  <div class="nav-right">
    <a href="#">Tech</a>
    <a href="#">Fashion</a>
    <a href="#">Home</a>
  </div>
</nav>

<div class="categories">
  <button class="cat-btn active">🔥 All Deals</button>
  <button class="cat-btn">💻 Tech & Gadgets</button>
  <button class="cat-btn">👗 Fashion</button>
  <button class="cat-btn">🏠 Home & Kitchen</button>
  <button class="cat-btn">💄 Beauty</button>
  <button class="cat-btn">⚽ Sports</button>
  <button class="cat-btn">✈️ Travel</button>
</div>

<div class="section">
  <div class="section-title">🔥 Hot Deals <span class="badge">Live Now</span></div>
  <div class="grid" id="deals-grid"></div>
</div>

<div class="whatsapp-bar">
  <h2>💬 Join Our WhatsApp Deal Group</h2>
  <p>Get instant alerts when new deals drop — directly in WhatsApp!</p>
  <a class="wa-btn" href="https://wa.me/?text=Add+me+to+the+deals+group" target="_blank">Join Free Group →</a>
</div>

<div class="section">
  <div class="section-title">⚡ Flash Deals</div>
  <div class="grid" id="flash-grid"></div>
</div>

<footer>
  Built with ❤️ · <span>DealZone</span> · Affiliate links may earn a commission
</footer>

<script>
const deals = [
 {tag:'Household Supplies',title:'82.5-Oz Persil Advanced Clean Oxi+Odor Power Liquid Laundry Detergent (82 Loads)',desc:'82.5-Oz Persil Advanced Clean Oxi+Odor Power Liquid Laundry Detergent (82 Loads) on sale for $13.35 - 5% off when you checkout via Subscribe & Save = $12.68. Shipping is free with Prime or on $35+ orders.',price:'$13',old:'$26',discount:'50% OFF',link:'https://www.amazon.com/dp/B08YJVZT65/ref=ox_sc_act_title_1/th=1?tag=amazon0a693-20',emoji:'🎧'},
{tag:'Shoes',title:'Merrell Men's Moab 3 Mid Hiking Boot',desc:'Merrell Men's Moab 3 Mid Hiking Boot (Granite) on sale for $74.83. Shipping is free.',price:'$75',old:'$130',discount:'42% OFF',link:'https://www.amazon.com/dp/B0987WLD6T/th=1?tag=amazon0a693-20',emoji:'🎧'},
{tag:'Computers',title:'Apple 2026 MacBook Air 13-inch',desc:'Apple 2026 MacBook Air 13-inch Laptop with M5 chip: Built for AI, 13.6-inch Liquid Retina Display, 16GB Unified Memory, 512GB SSD, 12MP Center Stage Camera, Touch ID, Wi-Fi 7; Sky Blue',price:'$950',old:'$1099',discount:'13% OFF',link:'https://www.amazon.com/gp/product/B0GR1493ZV/ref=sw_img_1/th=1?tag=amazon0a693-20',emoji:'🎧'},
{tag:'Beauty & Personal Care',title:'Paco Rabanne 1 Million Fragrance For Men ',desc:'Paco Rabanne 1 Million Fragrance For Men - Fresh And Spicy - Notes Of Amber, Leather And Tangerine - Adds A Touch Of Irresistible Seduction - Ideal For Men With Rebellious Charm - Edt Spray - 3.4 Oz',price:'$45',old:'$77',discount:'41% OFF',link:'https://www.amazon.com/Paco-Rabanne-Million-Men-Spray/dp/B002XQ1X4G/th=1?tag=amazon0a693-20',emoji:'🎧'},
{tag:'Grocery',title:'Lavazza Espresso Barista Gran Crema Whole Bean Coffee Blend,',desc:'Medium Espresso Roast, Oz Bag (Packaging May Vary) - 2.2 LB, 35.2 Ounce',price:'$11',old:'$22',discount:'50% OFF',link:'https://www.amazon.com/dp/B005OJ4X32/th=1?tag=amazon0a693-20',emoji:'🎧'},
{tag:'Tools & Home Improvement',title:'JORGENSEN No.101 Mini Wood Planer ',desc:'Mini Hand Planer for Woodworking, Block Plane, Small Hand Plane for Trimming, Wood Planing, Craft, Professional Ductile Iron Body, Adjustable Cutting Depth',price:'$13',old:'$20',discount:'35% OFF',link:'https://www.amazon.com/JORGENSEN-Planer-Woodworking-Trimming-Planing/dp/B0BVZK331X//th=1?tag=amazon0a693-20',emoji:'🎧'},
{tag:'Household',title:'Scotch-Brite Odor Resist Soap Control Dishwand Brush',desc:'Non-Scratch Cleaning Brush with Scraper, Stands Upright, 1 Pack',price:'$4.95',old:'$14',discount:'64% OFF',link:'https://www.amazon.com/gp/product/B07LGVV4M8/ref=ox_sc_act_title_1/th=1?tag=amazon0a693-20',emoji:'🎧'}
];

const flash = [
  {tag:'Limited',title:'Running Watch',desc:'GPS, heart rate, sleep tracking built-in.',price:'$79',old:'$180',discount:'56% OFF',link:'#your-affiliate-link',emoji:'⌚'},
  {tag:'Flash',title:'Laptop Stand',desc:'Ergonomic, adjustable, foldable design.',price:'$25',old:'$55',discount:'55% OFF',link:'#your-affiliate-link',emoji:'💻'},
  {tag:'Flash',title:'Coffee Maker',desc:'Brews in 3 mins, 12-cup, programmable.',price:'$39',old:'$80',discount:'51% OFF',link:'#your-affiliate-link',emoji:'☕'},
];

function renderCards(data, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = data.map(d => `
    <div class="card">
      <div class="card-img">${d.emoji}</div>
      <div class="card-body">
        <div class="tag">${d.tag}</div>
        <div class="card-title">${d.title}</div>
        <div class="card-desc">${d.desc}</div>
        <div class="price-row">
          <span class="price">${d.price}</span>
          <span class="old-price">${d.old}</span>
          <span class="discount">${d.discount}</span>
        </div>
        <a class="cta-btn" href="${d.link}" target="_blank">Get Deal →</a>
      </div>
    </div>
  `).join('');
}

renderCards(deals, 'deals-grid');
renderCards(flash, 'flash-grid');

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
</body>
</html>
